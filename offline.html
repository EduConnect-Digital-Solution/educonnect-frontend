<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduConnect – You're Offline</title>
  <link rel="icon" type="image/svg+xml" href="/logo.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #104889;
      --yellow: #FEC11B;
      --bg: #f8fafc;
      --text: #1e293b;
      --muted: #64748b;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: -0.02em;
      margin-bottom: 3rem;
    }

    .icon-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #e0eaf8;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }

    .icon-wrap svg {
      width: 48px;
      height: 48px;
      stroke: var(--blue);
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 800;
      color: var(--text);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1rem;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.7;
      margin: 0 auto 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background: var(--blue);
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover { background: #0d3a6e; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .status {
      margin-top: 3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="logo">EduConnect</div>

  <div class="icon-wrap">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3 3l8.5 8.5M21 3l-8.5 8.5m0 0l8.5 8.5M11.5 11.5L3 20M12 12.5v9m0-9C9.5 10 7.5 8.5 5.5 7 4 6 2.5 5 2.5 5m9 7.5C14 10 16 8.5 18 7c1.5-1 3-2 3-2" />
    </svg>
  </div>

  <h1>You're offline</h1>
  <p>
    It looks like your internet connection is unavailable. 
    EduConnect needs a connection to load your school data. 
    Please check your network and try again.
  </p>

  <button class="btn" onclick="window.location.reload()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
    </svg>
    Try Again
  </button>

  <div class="status">
    <div class="dot"></div>
    No internet connection
  </div>

  <script>
    // Auto-retry when connection returns
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
